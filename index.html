<!DOCTYPE html>
<html lang="pt-BR">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Interativo - Árvores Frutíferas IFES Cachoeiro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

        /* MANTENDO TODO O SEU CSS ORIGINAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Roboto', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e9f2e9 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background-color: rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 40, 0, 0.2); overflow: hidden; border: 1px solid #a5d6a5; }
        .header { background: linear-gradient(135deg, #2e7d32 0%, #4caf50 50%, #81c784 100%); color: white; padding: 20px 30px; border-bottom: 4px solid #1b5e20; }
        .header h1 { font-size: 2.2em; font-weight: 600; letter-spacing: 1px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
        .header p { font-size: 1.1em; opacity: 0.95; margin-top: 8px; font-style: italic; }
        .info-bar { background-color: #f1f8e9; padding: 15px 30px; border-bottom: 2px solid #a5d6a5; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; }
        .stats { background-color: #c8e6c9; padding: 8px 16px; border-radius: 30px; font-weight: bold; color: #1b5e20; border: 1px solid #66bb6a; }
        .filter-container { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        #fruit-filter { padding: 8px 15px; border-radius: 20px; border: 2px solid #4caf50; background-color: white; min-width: 200px; color: #1b5e20; cursor: pointer; }
        .count-badge { background-color: #ffb74d; color: #bf360c; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
        .reset-btn { background-color: #ffb74d; border: none; color: #bf360c; padding: 6px 15px; border-radius: 30px; font-weight: bold; cursor: pointer; border: 1px solid #f57c00; }
        .main-content { display: flex; min-height: 700px; }
        .legend-section { width: 35%; background-color: #f9fff9; border-right: 3px solid #a5d6a5; padding: 20px; overflow-y: auto; max-height: 700px; }
        .map-section { width: 65%; padding: 20px; background: #e8f5e8; display: flex; flex-direction: column; }
        .map-container { width: 100%; height: 600px; border-radius: 15px; overflow: hidden; border: 3px solid #4caf50; box-shadow: 0 4px 15px rgba(0, 40, 0, 0.3); margin-bottom: 15px; }
        #map { width: 100%; height: 100%; }
        .map-controls { background-color: white; border-radius: 10px; padding: 12px; border: 1px solid #4caf50; display: flex; gap: 10px; align-items: center; }
        .map-controls button { background-color: #f1f8e9; border: 2px solid #4caf50; color: #1b5e20; padding: 8px 16px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .fruit-category { margin-bottom: 25px; border: 1px solid #c8e6c9; border-radius: 15px; overflow: hidden; }
        .fruit-header { background: linear-gradient(135deg, #e8f5e8 0%, #c8e6c9 100%); padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: bold; color: #1b5e20; }
        .tree-list { list-style: none; padding: 10px; background-color: white; }
        .tree-item { padding: 10px; border-bottom: 1px dashed #c8e6c9; cursor: pointer; font-size: 0.9em; }
        .tree-item:hover { background-color: #f1f8e9; }
        .tree-item.selected { background-color: #c8e6c9; border-left: 4px solid #2e7d32; }
        .tree-id { background-color: #4caf50; color: white; padding: 2px 6px; border-radius: 5px; margin-right: 5px; }
        .footer { background-color: #2e7d32; color: white; text-align: center; padding: 15px; border-top: 2px solid #1b5e20; }
        
        /* Ajuste para o popup do Leaflet ficar com a cara do seu projeto */
        .leaflet-popup-content-wrapper { border-radius: 10px; border: 2px solid #4caf50; }
        .leaflet-popup-content h4 { color: #2e7d32; margin-bottom: 5px; }
    </style>
</head>

            </div>
        </div>

        let markerList = [];

        // FUNÇÃO PARA CRIAR OS MARCADORES
        function renderMarkers(filter = 'all') {
            // Limpa marcadores existentes
            markerList.forEach(m => map.removeLayer(m));
            markerList = [];

            treeData.forEach(tree => {
                if (filter === 'all' || tree.nome === filter) {
                    const emoji = fruitEmojis[tree.nome] || "🍎";
                    
                    // Criando um ícone customizado com Emoji
                    const customIcon = L.divIcon({
                        html: `<div style="font-size: 20px; text-shadow: 2px 2px 2px black;">${emoji}</div>`,
                        className: 'dummy',
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    const marker = L.marker([tree.coord1, tree.coord2], { icon: customIcon })
                        .addTo(map)
                        .bindPopup(`
                            <div class="info-window-content">
                                <h4>${emoji} ${tree.nome}</h4>
                                <p><strong>ID:</strong> #${tree.id}</p>
                                <p><strong>Local:</strong> ${tree.descricao}</p>
                                <p style="font-size:0.8em">Lat: ${tree.coord1.toFixed(5)} | Lng: ${tree.coord2.toFixed(5)}</p>
                            </div>
                        `);
                    
                    marker.on('click', () => highlightTreeInList(tree.id));
                    markerList.push(marker);
                }
            });
        }

        // FUNÇÃO PARA RENDERIZAR A LISTA LATERAL (CATEGORIAS)
        function renderUI() {
            const container = document.getElementById('fruit-list-container');
            const select = document.getElementById('fruit-filter');
            container.innerHTML = '';

            const groups = {};
            treeData.forEach(t => {
                if (!groups[t.nome]) groups[t.nome] = [];
                groups[t.nome].push(t);
            });

            Object.keys(groups).sort().forEach(nome => {
                // Adicionar no select de filtro
                const opt = document.createElement('option');
                opt.value = nome;
                opt.textContent = nome;
                select.appendChild(opt);

                // Criar Categorias na lista
                const groupDiv = document.createElement('div');
                groupDiv.className = 'fruit-category';
                groupDiv.innerHTML = `
                    <div class="fruit-header">
                        <span>${fruitEmojis[nome] || "🍎"}</span>
                        <span style="flex-grow:1">${nome}</span>
                        <span class="count-badge" style="background:#2e7d32; color:white">${groups[nome].length}</span>
                    </div>
                    <ul class="tree-list">
                        ${groups[nome].map(t => `
                            <li class="tree-item" data-id="${t.id}" onclick="focusTree(${t.coord1}, ${t.coord2}, ${t.id})">
                                <span class="tree-id">#${t.id}</span> ${t.descricao}
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(groupDiv);
            });
        }

        function focusTree(lat, lng, id) {
            map.setView([lat, lng], 20);
            highlightTreeInList(id);
        }

        function highlightTreeInList(id) {
            document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('selected'));
            const active = document.querySelector(`.tree-item[data-id="${id}"]`);
            if (active) {
                active.classList.add('selected');
                active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            const tree = treeData.find(t => t.id === id);
            document.getElementById('selected-tree-info').textContent = `${fruitEmojis[tree.nome]} ${tree.nome} (#${id})`;
        }

        // EVENTOS DOS FILTROS
        document.getElementById('fruit-filter').addEventListener('change', (e) => {
            renderMarkers(e.target.value);
            const count = e.target.value === 'all' ? treeData.length : treeData.filter(t => t.nome === e.target.value).length;
            document.getElementById('filter-count').textContent = `${count} árvores`;
        });

        document.getElementById('reset-filter').addEventListener('click', () => {
            document.getElementById('fruit-filter').value = 'all';
            renderMarkers('all');
            document.getElementById('filter-count').textContent = `${treeData.length} árvores`;
        });

        document.getElementById('recenter').addEventListener('click', () => {
            map.setView([centerLat, centerLng], 17);
        });

        // INICIAR TUDO
        renderUI();
        renderMarkers();

    </script>
</body>
</html>
